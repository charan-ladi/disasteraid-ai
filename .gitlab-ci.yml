stages:
  - setup
  - quality
  - security
  - test
  - validation
  - build

image: python:3.11

variables:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

before_script:
before_script:
  - py --version
  - py -m pip install --upgrade pip
  - py -m pip install -r requirements.txt
  - pip install black ruff mypy bandit pytest pytest-cov detect-secrets semgrep

# -------------------------
# SETUP
# -------------------------

install_dependencies:
  stage: setup
  script:
    - pip check

# -------------------------
# QUALITY
# -------------------------

black_format:
  stage: quality
  script:
    - black --check .

ruff_lint:
  stage: quality
  script:
    - ruff check .

mypy_typecheck:
  stage: quality
  script:
    - mypy . --ignore-missing-imports

# -------------------------
# SECURITY
# -------------------------

bandit_scan:
  stage: security
  script:
    - bandit -r . -x tests

detect_secrets:
  stage: security
  script:
    - detect-secrets scan --all-files

semgrep_scan:
  stage: security
  script:
    - semgrep --config=auto .

# -------------------------
# TEST
# -------------------------

pytest_tests:
  stage: test
  script:
    - pytest tests -v

coverage_check:
  stage: test
  script:
    - pytest --cov=. --cov-report=term-missing

# -------------------------
# VALIDATION
# -------------------------

schema_validation:
  stage: validation
  script:
    - py scripts/validate_schema.py

offline_validation:
  stage: validation
  script:
    - py scripts/check_offline.py

# -------------------------
# BUILD
# -------------------------

build_validation:
  stage: build
  script:
    - py -m compileall .