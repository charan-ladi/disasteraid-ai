stages:
  - lint
  - format
  - type_check
  - security
  - test
  - coverage
  - schema_validate
  - model_check
  - offline_test
  - build

before_script:
  - python3 -m pip install -r requirements.txt --break-system-packages --quiet


lint:
  stage: lint
  script:
    - python3 -m ruff check utils/ tests/ scripts/

format:
  stage: format
  script:
    - python3 -m black --check utils/ tests/ scripts/

type_check:
  stage: type_check
  script:
    - python3 -m mypy utils/ --ignore-missing-imports

security:
  stage: security
  script:
    - python3 -m bandit -r utils/ -ll

test:
  stage: test
  script:
    - python3 -m pytest tests/ -v

coverage:
  stage: coverage
  script:
    - python3 -m pytest tests/ --cov=utils --cov-report=term-missing --cov-fail-under=70

schema_validate:
  stage: schema_validate
  script:
    - python3 scripts/validate_schema.py

model_check:
  stage: model_check
  script:
    - python3 scripts/check_models.py

offline_test:
  stage: offline_test
  script:
    - python3 -m pytest tests/test_offline.py -v

build:
  stage: build
  script:
    - python3 -m pip check
